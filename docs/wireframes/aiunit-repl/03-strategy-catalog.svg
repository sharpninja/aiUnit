<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">aiUnit REPL TUI wireframe - strategy catalog</title>
  <desc id="desc">Terminal UI for cataloging discovered strategies and applying them to selected projects.</desc>
  <style>
    .bg{fill:#101418}.panel{fill:#151b21;stroke:#38434f;stroke-width:2}.panel2{fill:#11171d;stroke:#2c3742;stroke-width:2}.focus{stroke:#4da3ff;stroke-width:3}.text{font:16px Consolas,monospace;fill:#e6edf3}.muted{font:14px Consolas,monospace;fill:#9aa7b2}.title{font:22px Consolas,monospace;font-weight:bold;fill:#f4f7fa}.green{fill:#7ee787}.amber{fill:#f2cc60}.red{fill:#ff7b72}.blue{fill:#79c0ff}.line{stroke:#38434f;stroke-width:1}
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <rect class="panel" x="24" y="20" width="1152" height="56" rx="4"/>
  <text class="title" x="44" y="55">aiunit tui - Strategy Catalog</text>
  <text class="muted" x="790" y="55">catalog: 7 discovered | conflicts: 1</text>

  <rect class="panel2" x="24" y="92" width="190" height="596" rx="4"/>
  <text class="muted" x="44" y="126">NAVIGATION</text>
  <text class="text" x="52" y="173">  Overview</text>
  <text class="text" x="52" y="215">  Projects</text>
  <rect class="panel focus" x="38" y="238" width="162" height="42" rx="3"/>
  <text class="text" x="52" y="265">> Catalog</text>
  <text class="text" x="52" y="316">  Validate</text>
  <text class="text" x="52" y="358">  Deploy</text>

  <rect class="panel" x="232" y="92" width="604" height="596" rx="4"/>
  <text class="title" x="252" y="128">Reusable Strategies</text>
  <text class="muted" x="252" y="158">deduplicated by kind, command/endpoint, model, env var</text>
  <line class="line" x1="252" y1="176" x2="816" y2="176"/>
  <text class="muted" x="252" y="206">STRATEGY</text>
  <text class="muted" x="470" y="206">SOURCE PROJECTS</text>
  <text class="muted" x="700" y="206">STATUS</text>
  <rect class="panel2 focus" x="248" y="222" width="568" height="58" rx="3"/>
  <text class="text" x="266" y="250">codex cli gpt-5.5</text>
  <text class="text" x="470" y="250">2</text>
  <text class="green" x="700" y="250">ready</text>
  <text class="muted" x="266" y="272">command: codex exec -m gpt-5.5</text>
  <rect class="panel2" x="248" y="292" width="568" height="58" rx="3"/>
  <text class="text" x="266" y="320">claude cli sonnet</text>
  <text class="text" x="470" y="320">1</text>
  <text class="green" x="700" y="320">ready</text>
  <text class="muted" x="266" y="342">command: claude --print --model sonnet</text>
  <rect class="panel2" x="248" y="362" width="568" height="58" rx="3"/>
  <text class="text" x="266" y="390">openai http gpt-5</text>
  <text class="text" x="470" y="390">2</text>
  <text class="amber" x="700" y="390">env var</text>
  <text class="muted" x="266" y="412">endpoint: https://api.openai.com/v1</text>
  <rect class="panel2" x="248" y="432" width="568" height="58" rx="3"/>
  <text class="text" x="266" y="460">grok http grok-4</text>
  <text class="text" x="470" y="460">2</text>
  <text class="red" x="700" y="460">conflict</text>
  <text class="muted" x="266" y="482">same name, different endpoint in one project</text>

  <rect class="panel2" x="252" y="530" width="560" height="116" rx="4"/>
  <text class="title" x="272" y="566">Apply Preview</text>
  <text class="text" x="272" y="600">target: 4 projects selected</text>
  <text class="text" x="272" y="632">effect: add missing codex; preserve active if already set</text>

  <rect class="panel" x="854" y="92" width="322" height="596" rx="4"/>
  <text class="title" x="874" y="128">Catalog Actions</text>
  <rect class="panel2 focus" x="874" y="158" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="186">A Apply to selected</text>
  <rect class="panel2" x="874" y="214" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="242">G Apply globally</text>
  <rect class="panel2" x="874" y="270" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="298">N New template</text>
  <rect class="panel2" x="874" y="326" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="354">C Clone strategy</text>
  <rect class="panel2" x="874" y="382" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="410">X Resolve conflict</text>
  <line class="line" x1="874" y1="452" x2="1152" y2="452"/>
  <text class="muted" x="874" y="488">selected projects</text>
  <text class="green" x="874" y="520">[x] aiUnit.Tests</text>
  <text class="green" x="874" y="550">[x] RiskyStars.Tests</text>
  <text class="green" x="874" y="580">[x] TruckMate.AgentTests</text>
  <text class="muted" x="874" y="610">[ ] Sample.Consumer.Tests</text>

  <rect class="panel" x="24" y="704" width="1152" height="36" rx="4"/>
  <text class="text" x="44" y="728">: apply-global codex --dry-run    Space Toggle Project    Enter Apply    Esc Back</text>
</svg>
