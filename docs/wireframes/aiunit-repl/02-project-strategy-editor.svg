<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">aiUnit REPL TUI wireframe - project strategy editor</title>
  <desc id="desc">Terminal UI for per-project strategy editing, active strategy selection, validation, and restore.</desc>
  <style>
    .bg{fill:#101418}.panel{fill:#151b21;stroke:#38434f;stroke-width:2}.panel2{fill:#11171d;stroke:#2c3742;stroke-width:2}.focus{stroke:#4da3ff;stroke-width:3}.text{font:16px Consolas,monospace;fill:#e6edf3}.muted{font:14px Consolas,monospace;fill:#9aa7b2}.title{font:22px Consolas,monospace;font-weight:bold;fill:#f4f7fa}.green{fill:#7ee787}.amber{fill:#f2cc60}.red{fill:#ff7b72}.blue{fill:#79c0ff}.line{stroke:#38434f;stroke-width:1}
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <rect class="panel" x="24" y="20" width="1152" height="56" rx="4"/>
  <text class="title" x="44" y="55">aiunit tui - Project Strategy Editor</text>
  <text class="muted" x="742" y="55">project: SharpNinja.AiUnit.Tests | config valid</text>

  <rect class="panel2" x="24" y="92" width="190" height="596" rx="4"/>
  <text class="muted" x="44" y="126">NAVIGATION</text>
  <text class="text" x="52" y="173">  Overview</text>
  <rect class="panel focus" x="38" y="196" width="162" height="42" rx="3"/>
  <text class="text" x="52" y="223">> Projects</text>
  <text class="text" x="52" y="274">  Catalog</text>
  <text class="text" x="52" y="316">  Validate</text>
  <text class="text" x="52" y="358">  Deploy</text>

  <rect class="panel" x="232" y="92" width="604" height="596" rx="4"/>
  <text class="title" x="252" y="128">Strategies</text>
  <text class="muted" x="252" y="158">zero or more allowed; one active when tests run</text>
  <line class="line" x1="252" y1="176" x2="816" y2="176"/>
  <text class="muted" x="252" y="206">NAME</text>
  <text class="muted" x="432" y="206">KIND</text>
  <text class="muted" x="540" y="206">MODEL</text>
  <text class="muted" x="720" y="206">STATE</text>
  <rect class="panel2 focus" x="248" y="222" width="568" height="54" rx="3"/>
  <text class="green" x="266" y="255">* codex</text>
  <text class="text" x="432" y="255">cli</text>
  <text class="blue" x="540" y="255">gpt-5.5</text>
  <text class="green" x="720" y="255">active</text>
  <rect class="panel2" x="248" y="286" width="568" height="54" rx="3"/>
  <text class="text" x="266" y="319">  claude</text>
  <text class="text" x="432" y="319">cli</text>
  <text class="blue" x="540" y="319">sonnet</text>
  <text class="green" x="720" y="319">ready</text>
  <rect class="panel2" x="248" y="350" width="568" height="54" rx="3"/>
  <text class="text" x="266" y="383">  grok</text>
  <text class="text" x="432" y="383">http</text>
  <text class="blue" x="540" y="383">grok-4</text>
  <text class="amber" x="720" y="383">key env</text>

  <rect class="panel2" x="252" y="440" width="560" height="206" rx="4"/>
  <text class="title" x="272" y="476">Selected Strategy: codex</text>
  <text class="text" x="272" y="512">Kind: cli</text>
  <text class="text" x="272" y="544">Command: codex</text>
  <text class="text" x="272" y="576">Arguments: exec -m gpt-5.5</text>
  <text class="text" x="272" y="608">Timeout: 1800s</text>
  <text class="muted" x="272" y="638">unrelated JSON properties preserved on save</text>

  <rect class="panel" x="854" y="92" width="322" height="596" rx="4"/>
  <text class="title" x="874" y="128">Actions</text>
  <rect class="panel2 focus" x="874" y="158" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="186">A Add strategy</text>
  <rect class="panel2" x="874" y="214" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="242">E Edit selected</text>
  <rect class="panel2" x="874" y="270" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="298">D Delete selected</text>
  <rect class="panel2" x="874" y="326" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="354">S Set active</text>
  <rect class="panel2" x="874" y="382" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="410">R Restore snapshot</text>
  <line class="line" x1="874" y1="452" x2="1152" y2="452"/>
  <text class="muted" x="874" y="488">snapshot</text>
  <text class="green" x="874" y="520">latest: 2026-05-22 19:24Z</text>
  <text class="muted" x="874" y="558">validation</text>
  <text class="green" x="874" y="590">JSON valid</text>
  <text class="green" x="874" y="622">active strategy resolves</text>

  <rect class="panel" x="24" y="704" width="1152" height="36" rx="4"/>
  <text class="text" x="44" y="728">: set-active codex --project SharpNinja.AiUnit.Tests    Ctrl+S Save    Esc Back</text>
</svg>
