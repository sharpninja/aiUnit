<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">aiUnit REPL TUI wireframe - workspace overview</title>
  <desc id="desc">Terminal UI showing recursive discovery results, project list, and global strategy summary.</desc>
  <style>
    .bg{fill:#101418}.panel{fill:#151b21;stroke:#38434f;stroke-width:2}.panel2{fill:#11171d;stroke:#2c3742;stroke-width:2}.focus{stroke:#4da3ff;stroke-width:3}.text{font:16px Consolas,monospace;fill:#e6edf3}.muted{font:14px Consolas,monospace;fill:#9aa7b2}.title{font:22px Consolas,monospace;font-weight:bold;fill:#f4f7fa}.green{fill:#7ee787}.amber{fill:#f2cc60}.red{fill:#ff7b72}.blue{fill:#79c0ff}.line{stroke:#38434f;stroke-width:1}
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <rect class="panel" x="24" y="20" width="1152" height="56" rx="4"/>
  <text class="title" x="44" y="55">aiunit tui - Workspace Overview</text>
  <text class="muted" x="840" y="55">root: F:\GitHub | mode: TUI | strategy: codex</text>

  <rect class="panel2" x="24" y="92" width="190" height="596" rx="4"/>
  <text class="muted" x="44" y="126">NAVIGATION</text>
  <rect class="panel focus" x="38" y="146" width="162" height="42" rx="3"/>
  <text class="text" x="52" y="173">> Overview</text>
  <text class="text" x="52" y="222">  Projects</text>
  <text class="text" x="52" y="264">  Catalog</text>
  <text class="text" x="52" y="306">  Validate</text>
  <text class="text" x="52" y="348">  Deploy</text>
  <line class="line" x1="38" y1="376" x2="200" y2="376"/>
  <text class="muted" x="52" y="410">scan</text>
  <text class="muted" x="52" y="438">list</text>
  <text class="muted" x="52" y="466">apply-global</text>
  <text class="muted" x="52" y="494">restore</text>

  <rect class="panel" x="232" y="92" width="604" height="596" rx="4"/>
  <text class="title" x="252" y="128">Discovered aiUnit Projects</text>
  <text class="muted" x="252" y="158">recursive scan found 4 test projects, 7 strategies, 1 warning</text>
  <line class="line" x1="252" y1="176" x2="816" y2="176"/>
  <text class="muted" x="252" y="206">PROJECT</text>
  <text class="muted" x="565" y="206">ACTIVE</text>
  <text class="muted" x="670" y="206">COUNT</text>
  <text class="muted" x="744" y="206">STATE</text>
  <rect class="panel2 focus" x="248" y="222" width="568" height="54" rx="3"/>
  <text class="text" x="266" y="255">SharpNinja.AiUnit.Tests</text>
  <text class="blue" x="565" y="255">codex</text>
  <text class="text" x="690" y="255">3</text>
  <text class="green" x="744" y="255">valid</text>
  <rect class="panel2" x="248" y="286" width="568" height="54" rx="3"/>
  <text class="text" x="266" y="319">RiskyStars.Tests</text>
  <text class="blue" x="565" y="319">codex</text>
  <text class="text" x="690" y="319">2</text>
  <text class="green" x="744" y="319">valid</text>
  <rect class="panel2" x="248" y="350" width="568" height="54" rx="3"/>
  <text class="text" x="266" y="383">TruckMate.Wireframes.AgentTests</text>
  <text class="amber" x="565" y="383">none</text>
  <text class="text" x="690" y="383">0</text>
  <text class="amber" x="744" y="383">needs config</text>
  <rect class="panel2" x="248" y="414" width="568" height="54" rx="3"/>
  <text class="text" x="266" y="447">Sample.Consumer.Tests</text>
  <text class="blue" x="565" y="447">openai</text>
  <text class="text" x="690" y="447">2</text>
  <text class="green" x="744" y="447">valid</text>

  <rect class="panel2" x="252" y="504" width="560" height="142" rx="4"/>
  <text class="title" x="272" y="540">Scan Summary</text>
  <text class="text" x="272" y="574">configs: 3 present, 1 missing</text>
  <text class="text" x="272" y="606">package refs: SharpNinja.aiUnit found in 4 projects</text>
  <text class="text" x="272" y="638">next action: configure missing project or apply global strategy</text>

  <rect class="panel" x="854" y="92" width="322" height="596" rx="4"/>
  <text class="title" x="874" y="128">Details</text>
  <text class="muted" x="874" y="160">selected project</text>
  <text class="text" x="874" y="194">SharpNinja.AiUnit.Tests</text>
  <line class="line" x1="874" y1="212" x2="1152" y2="212"/>
  <text class="muted" x="874" y="246">config path</text>
  <text class="text" x="874" y="276">tests/.../appsettings.aiunit.json</text>
  <text class="muted" x="874" y="318">strategies</text>
  <text class="text" x="874" y="350">codex cli gpt-5.5</text>
  <text class="text" x="874" y="380">claude cli sonnet</text>
  <text class="text" x="874" y="410">grok http grok-4</text>
  <line class="line" x1="874" y1="438" x2="1152" y2="438"/>
  <rect class="panel2" x="874" y="464" width="278" height="42" rx="3"/>
  <text class="text" x="892" y="492">Enter: open project</text>
  <rect class="panel2" x="874" y="518" width="278" height="42" rx="3"/>
  <text class="text" x="892" y="546">G: apply global</text>
  <rect class="panel2" x="874" y="572" width="278" height="42" rx="3"/>
  <text class="text" x="892" y="600">V: validate all</text>

  <rect class="panel" x="24" y="704" width="1152" height="36" rx="4"/>
  <text class="text" x="44" y="728">: scan --root F:\GitHub    F1 Help    Ctrl+R REPL    Ctrl+Q Quit</text>
</svg>
