<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">aiUnit REPL TUI wireframe - validation and deploy</title>
  <desc id="desc">Terminal UI for validating configurations, running smoke checks, packaging the .NET tool, and showing publish readiness.</desc>
  <style>
    .bg{fill:#101418}.panel{fill:#151b21;stroke:#38434f;stroke-width:2}.panel2{fill:#11171d;stroke:#2c3742;stroke-width:2}.focus{stroke:#4da3ff;stroke-width:3}.text{font:16px Consolas,monospace;fill:#e6edf3}.muted{font:14px Consolas,monospace;fill:#9aa7b2}.title{font:22px Consolas,monospace;font-weight:bold;fill:#f4f7fa}.green{fill:#7ee787}.amber{fill:#f2cc60}.red{fill:#ff7b72}.blue{fill:#79c0ff}.line{stroke:#38434f;stroke-width:1}
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <rect class="panel" x="24" y="20" width="1152" height="56" rx="4"/>
  <text class="title" x="44" y="55">aiunit tui - Validation and Deploy</text>
  <text class="muted" x="754" y="55">suite: ready | package: pending | publish: guarded</text>

  <rect class="panel2" x="24" y="92" width="190" height="596" rx="4"/>
  <text class="muted" x="44" y="126">NAVIGATION</text>
  <text class="text" x="52" y="173">  Overview</text>
  <text class="text" x="52" y="215">  Projects</text>
  <text class="text" x="52" y="257">  Catalog</text>
  <rect class="panel focus" x="38" y="280" width="162" height="42" rx="3"/>
  <text class="text" x="52" y="307">> Validate</text>
  <text class="text" x="52" y="358">  Deploy</text>

  <rect class="panel" x="232" y="92" width="604" height="596" rx="4"/>
  <text class="title" x="252" y="128">Validation Gates</text>
  <text class="muted" x="252" y="158">each gate records command, duration, and artifact path</text>
  <line class="line" x1="252" y1="176" x2="816" y2="176"/>
  <rect class="panel2 focus" x="248" y="202" width="568" height="56" rx="3"/>
  <text class="green" x="266" y="235">PASS</text>
  <text class="text" x="342" y="235">discover fixture workspace</text>
  <text class="muted" x="646" y="235">00:01.2</text>
  <rect class="panel2" x="248" y="272" width="568" height="56" rx="3"/>
  <text class="green" x="266" y="305">PASS</text>
  <text class="text" x="342" y="305">validate strategy JSON</text>
  <text class="muted" x="646" y="305">00:00.4</text>
  <rect class="panel2" x="248" y="342" width="568" height="56" rx="3"/>
  <text class="amber" x="266" y="375">PEND</text>
  <text class="text" x="342" y="375">capture TUI screenshots</text>
  <text class="muted" x="646" y="375">after Slice 6</text>
  <rect class="panel2" x="248" y="412" width="568" height="56" rx="3"/>
  <text class="amber" x="266" y="445">PEND</text>
  <text class="text" x="342" y="445">aiUnit wireframe comparisons</text>
  <text class="muted" x="646" y="445">after screenshots</text>
  <rect class="panel2" x="248" y="482" width="568" height="56" rx="3"/>
  <text class="amber" x="266" y="515">PEND</text>
  <text class="text" x="342" y="515">dotnet tool pack/install smoke</text>
  <text class="muted" x="646" y="515">after package</text>

  <rect class="panel2" x="252" y="574" width="560" height="72" rx="4"/>
  <text class="title" x="272" y="610">Current Blocker</text>
  <text class="text" x="272" y="638">finished TUI screenshots wait on TUI implementation</text>

  <rect class="panel" x="854" y="92" width="322" height="596" rx="4"/>
  <text class="title" x="874" y="128">Artifacts</text>
  <text class="muted" x="874" y="160">wireframes</text>
  <text class="green" x="874" y="192">4 SVGs defined</text>
  <text class="muted" x="874" y="236">screenshots</text>
  <text class="amber" x="874" y="268">docs/screenshots/aiunit-repl/*.png</text>
  <text class="muted" x="874" y="312">comparison YAML</text>
  <text class="amber" x="874" y="344">tests/.../WireframeComparisons</text>
  <text class="muted" x="874" y="388">nuget package</text>
  <text class="amber" x="874" y="420">SharpNinja.aiUnit.Tool</text>
  <line class="line" x1="874" y1="460" x2="1152" y2="460"/>
  <rect class="panel2 focus" x="874" y="486" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="514">R Run selected gate</text>
  <rect class="panel2" x="874" y="542" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="570">O Open artifact</text>
  <rect class="panel2" x="874" y="598" width="278" height="44" rx="3"/>
  <text class="text" x="892" y="626">P Pack tool</text>

  <rect class="panel" x="24" y="704" width="1152" height="36" rx="4"/>
  <text class="text" x="44" y="728">: validate --all    R Run    O Open    P Pack    Ctrl+Q Quit</text>
</svg>
