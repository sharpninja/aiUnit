schema_version: 1
project: SharpNinja.aiUnit
description: xUnit extension for AI frontier-model regression testing. HTTP adapters (Anthropic, OpenAI-compatible, Gemini) plus CLI strategies (claude, codex), strategy resolver, and auto-skip when no strategy resolves.
project_version: 0.1.0-preview.1
ingest_target:
  base_url: http://PAYTON-LEGION2:7147
  fr_endpoint: /mcpserver/requirements/fr
  tr_endpoint: /mcpserver/requirements/tr
  test_endpoint: /mcpserver/requirements/test
  mapping_endpoint: /mcpserver/requirements/mapping
  auth_header: X-Api-Key
  notes: |
    On detach, this file is the canonical FR/TR/Test catalog for the
    SharpNinja.aiUnit workspace. POST each row in `frs`/`trs`/`tests` to the
    matching endpoint, then POST each mapping in `mappings.frToTr` and
    `mappings.frToTest`. Use the body shape documented in McpServer's
    swagger (`/swagger/v1/swagger.json`).

frs:
  - id: AIUNIT-FR-001
    title: Self-contained library with zero TruckMate references
    body: aiUnit ships with no ProjectReference / NuGet ref to any TruckMate or app-specific assembly. A build-time guard test fails the suite on any leak of the substring "TruckMate." in source under `libs/SharpNinja.aiUnit/src/**`.
    status: implemented
  - id: AIUNIT-FR-002
    title: net10.0 target framework
    body: csproj declares <TargetFramework>net10.0</TargetFramework> to match the contemporary consumer projects. Multi-targeting is deferred.
    status: implemented
  - id: AIUNIT-FR-003
    title: NuGet-packable with full metadata
    body: dotnet pack produces SharpNinja.aiUnit.0.1.0-preview.1.nupkg + .snupkg with Authors, Description, RepositoryUrl, License (MIT), PackageTags, IncludeSymbols, EmbedUntrackedSources, SymbolPackageFormat=snupkg.
    status: implemented
  - id: AIUNIT-FR-004
    title: Anthropic Claude HTTP adapter
    body: ClaudeFrontierClient sends to /v1/messages with x-api-key + anthropic-version header and parses the content[].text response shape.
    status: implemented
  - id: AIUNIT-FR-005
    title: OpenAI-compatible HTTP adapter
    body: OpenAiCompatibleFrontierClient is a single adapter speaking /v1/chat/completions with Bearer auth and OpenAI/xAI JSON shape; covers OpenAI, xAI, MAF, Cline, OpenAI Codex API, and any provider speaking the same surface. Cost rates resolve from model prefix.
    status: implemented
  - id: AIUNIT-FR-006
    title: Google Gemini HTTP adapter
    body: GeminiFrontierClient sends to generativelanguage.googleapis.com with the API key as a `key=` query param and parses candidates[0].content.parts[0].text.
    status: implemented
  - id: AIUNIT-FR-007
    title: CLI subscription strategy for Claude Code
    body: CliFrontierClient spawns `claude --print --output-format json --dangerously-skip-permissions [--model <id>]` and parses {"result":"..."} JSON. No API key required; the CLI handles auth.
    status: implemented
  - id: AIUNIT-FR-008
    title: CLI subscription strategy for OpenAI Codex
    body: CliFrontierClient spawns `codex exec --skip-git-repo-check [--model <id>] <prompt>` and returns raw stdout. No API key required; the CLI handles auth.
    status: implemented
  - id: AIUNIT-FR-009
    title: Generic CLI fallback for arbitrary binaries
    body: For any other Command value the runner passes the merged prompt as a single positional arg and returns stdout raw.
    status: implemented
  - id: AIUNIT-FR-010
    title: Image and text attachment handling for CLI strategies
    body: Image attachments are written to a per-call temp workspace under Path.GetTempPath() and referenced inline by absolute path; text attachments are inlined under fenced --- name --- blocks. The workspace is deleted in a finally block on success and failure.
    status: implemented
  - id: AIUNIT-FR-011
    title: Strategy resolver via appsettings.aiunit.json
    body: AiUnitStrategyLoader reads a top-level `AiUnit:Strategies` dict + `ActiveStrategy` from a JSON file in AppContext.BaseDirectory (with parent-directory walk).
    status: implemented
  - id: AIUNIT-FR-012
    title: Env var override precedence
    body: AIUNIT_STRATEGY beats JSON ActiveStrategy beats the "claude" hard fallback. Field overrides AIUNIT_BASE_URL / AIUNIT_MODEL / AIUNIT_API_KEY / AIUNIT_TIMEOUT_SECONDS / AIUNIT_TEMPERATURE / AIUNIT_KIND / AIUNIT_COMMAND each beat the corresponding JSON value.
    status: implemented
  - id: AIUNIT-FR-013
    title: Strategy Kind dispatch
    body: AiUnitStrategyResolver dispatches Kind in {anthropic, openai-compatible, gemini, cli} to the matching adapter. Unknown Kind returns null + a clear skip reason.
    status: implemented
  - id: AIUNIT-FR-014
    title: '[AiFact] auto-skip when no strategy resolves'
    body: AiFactAttribute extends Xunit.SkippableFactAttribute and sets Skip=reason in its constructor when AiStrategyFixture.Default cannot resolve a client.
    status: implemented
  - id: AIUNIT-FR-015
    title: '[AiTheory] auto-skip + MemberData support'
    body: AiTheoryAttribute extends Xunit.SkippableTheoryAttribute. Same Skip ctor pattern. Per-row Skip.If via AiSkip.IfNoStrategy still available for runtime predicates.
    status: implemented
  - id: AIUNIT-FR-016
    title: AiStrategyFixture lifecycle
    body: AiStrategyFixture.Default is a lazy process-wide singleton; thread-safe; exposes Client, Resolved, SkipReason, IsResolved; disposes the underlying HttpClient via IDisposable. Never throws from Default.
    status: implemented
  - id: AIUNIT-FR-017
    title: JSON validator helpers
    body: AiUnitJsonAssertions provides Required, EnumIn, StringArray, ObjectArrayRequired primitives over System.Text.Json.JsonElement; throws AiResponseValidationException on failure.
    status: implemented
  - id: AIUNIT-FR-018
    title: Generic scenario catalog walker
    body: AiUnitScenarioCatalog.LoadAll<T> walks up from AppContext.BaseDirectory to find a marker directory and applies a consumer-supplied loader. AiUnitScenarioCatalog.LocateMarkerDirectory exposes the walk standalone.
    status: implemented
  - id: AIUNIT-FR-019
    title: NuGet-packable and subtree-split clean
    body: git subtree split --prefix=libs/SharpNinja.aiUnit produces a self-contained repo that builds and packs without TruckMate. Guard test enforces.
    status: implemented
  - id: AIUNIT-FR-020
    title: requirements.yaml ships in repo for MCP import
    body: A single requirements.yaml at the repo root catalogs all FR / TR / Test ids + mappings, formatted for direct POST into MCP Server after detach.
    status: implemented

trs:
  - id: AIUNIT-TR-001
    title: TargetFramework=net10.0
    body: csproj declares <TargetFramework>net10.0</TargetFramework>.
    status: implemented
  - id: AIUNIT-TR-002
    title: NuGet metadata complete
    body: PackageId=SharpNinja.aiUnit, Version, Authors, Description, RepositoryUrl, PackageLicenseExpression=MIT, PackageTags, PackageReadmeFile, IncludeSymbols=true, SymbolPackageFormat=snupkg, EmbedUntrackedSources=true.
    status: implemented
  - id: AIUNIT-TR-003
    title: No TruckMate symbol leaks under src/
    body: NoTruckMateLeak_GuardTest walks libs/SharpNinja.aiUnit/src/**/*.cs and asserts zero instances of "TruckMate." substring. Build-time enforcement.
    status: implemented
  - id: AIUNIT-TR-004
    title: Frontier contracts namespace
    body: All FrontierContracts records live under SharpNinja.AiUnit.Frontier with stable JSON shapes.
    status: implemented
  - id: AIUNIT-TR-005
    title: Standalone solution file
    body: libs/SharpNinja.aiUnit/SharpNinja.aiUnit.sln references only its own src + tests csprojs (no TruckMate refs).
    status: implemented
  - id: AIUNIT-TR-006
    title: FrontierClientBase retry policy
    body: Retries 502/503/504 up to 3 times with exponential backoff; 401/403 → auth_error; 429 → rate_limit; other 4xx → server_error with body excerpt.
    status: implemented
  - id: AIUNIT-TR-007
    title: Oversize attachment guard
    body: FrontierAttachment.MaxSizeBytes = 5 MB; clients reject attachments above with FrontierError code AttachmentTooLarge before HTTP send.
    status: implemented
  - id: AIUNIT-TR-008
    title: AiUnitHttpClientFactory
    body: Public IHttpClientFactory impl that builds a new HttpClient per call. Default factory for consumers that have no DI container.
    status: implemented
  - id: AIUNIT-TR-009
    title: OpenAiCompatibleSerializer
    body: Single internal serializer shared by OpenAI-compatible clients; handles image_url + response_format=json_object + max_tokens + temperature.
    status: implemented
  - id: AIUNIT-TR-010
    title: CliFrontierClient uses IProcessRunner seam
    body: SendAsync delegates to an injected IProcessRunner so unit tests substitute a stub instead of spawning real binaries.
    status: implemented
  - id: AIUNIT-TR-011
    title: CLI temp workspace cleanup
    body: Per-call temp dir under Path.GetTempPath()/aiunit-cli-<guid> deleted in finally regardless of success or failure.
    status: implemented
  - id: AIUNIT-TR-012
    title: Per-CLI flag dispatch
    body: claude → --print --output-format json --dangerously-skip-permissions [--model]; codex → exec --skip-git-repo-check [--model]; unknown → prompt as single positional arg.
    status: implemented
  - id: AIUNIT-TR-013
    title: appsettings.aiunit.json JSON shape
    body: Top-level key "AiUnit" with ActiveStrategy and Strategies dict; per-strategy keys Kind, BaseUrl, Model, ApiKeyEnvVar, Command, TimeoutSeconds, Temperature, Description.
    status: implemented
  - id: AIUNIT-TR-014
    title: Strategy env var prefix AIUNIT_
    body: Override precedence + naming use the AIUNIT_ prefix; decoupled from any consumer's WIREFRAME_AUDIT_ legacy.
    status: implemented
  - id: AIUNIT-TR-015
    title: ResolvedStrategy telemetry record
    body: Post-merge view exposing Name, Kind, BaseUrl, Model, TimeoutSeconds, Temperature.
    status: implemented
  - id: AIUNIT-TR-016
    title: Bundled sample appsettings
    body: samples/appsettings.aiunit.json ships with maf, cline, claude (cli, Sonnet 4.6), claude-api, grok, codex (cli), codex-api, gemini strategies as a template.
    status: implemented
  - id: AIUNIT-TR-017
    title: '[AiFact] inherits SkippableFactAttribute'
    body: Reuses Xunit.SkippableFact 1.4.13 extensibility; no custom IXunitTestCase machinery.
    status: implemented
  - id: AIUNIT-TR-018
    title: AiStrategyFixture.Default is process-wide lazy
    body: Single Lazy<AiStrategyFixture> built from AiUnitStrategyLoader.TryLoad() + AiUnitStrategyResolver.Build via reflection bridge; thread-safe; never throws.
    status: implemented
  - id: AIUNIT-TR-019
    title: AiTestCollection disables parallelization
    body: [CollectionDefinition(DisableParallelization=true)] enforces serial AI test execution to avoid rate-limit collisions. Assembly-level fallback in test project via [assembly: CollectionBehavior(DisableTestParallelization=true)].
    status: implemented
  - id: AIUNIT-TR-020
    title: AiUnitScenarioCatalog<T> root marker
    body: Walks up from AppContext.BaseDirectory looking for a configurable marker folder name. Default marker is supplied by the consumer.
    status: implemented
  - id: AIUNIT-TR-021
    title: Consumer references aiUnit via ProjectReference initially
    body: TruckMate.Wireframes.AgentTests.csproj adds ProjectReference to ../../libs/SharpNinja.aiUnit/src/SharpNinja.AiUnit/SharpNinja.AiUnit.csproj. Migration to PackageReference is deferred until aiUnit publishes to a feed.
    status: implemented
  - id: AIUNIT-TR-022
    title: Subtree-split rehearsal
    body: git subtree split --prefix=libs/SharpNinja.aiUnit -b aiunit-detach + clone + build proves no upward dependency.
    status: planned
  - id: AIUNIT-TR-023
    title: NuGet pack smoke
    body: dotnet pack -c Release produces a .nupkg consumable from a one-off console project that defines [AiFact] and verifies skip / run paths.
    status: implemented
  - id: AIUNIT-TR-024
    title: requirements.yaml MCP-import shape
    body: YAML schema matches MCP Server POST body for /requirements/fr|tr|test + /requirements/mapping (FrTrMapping {frId, trIds[]} and FrTestMapping {frId, testIds[]}).
    status: implemented

