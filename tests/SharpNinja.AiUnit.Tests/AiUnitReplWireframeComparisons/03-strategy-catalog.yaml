screenId: strategy-catalog
wireframeBaselineVersion: svg-1
title: Strategy catalog
prompt: |-
  Compare the finished aiUnit terminal screenshot against the rendered PNG baseline from the canonical SVG wireframe for the Strategy Catalog screen.
  Validate that the actual screen preserves reusable strategy rows, source project counts, status labels, apply preview, selected/global apply commands, and conflict-resolution affordances. Treat minor terminal styling differences as acceptable unless they hide or remove a required control, state, or label.
functionalRequirements:
- id: FR-AIUNITREPL-004
  text: Provide a TUI strategy catalog screen.
- id: FR-AIUNITREPL-006
  text: Catalog strategies from discovered projects and make each available for reuse in selected or all projects.
- id: FR-AIUNITREPL-005
  text: Preserve active strategy settings during global operations unless explicitly changed.
- id: FR-AIUNITREPL-009
  text: Provide SVG wireframes and capture finished TUI screenshots for each wireframe.
technicalRequirements:
- id: TR-AIUNITREPL-004
  text: Keep command parsing and TUI operations over a shared application service layer.
- id: TR-AIUNITREPL-007
  text: Wireframe comparison scenarios must include prompt, FR/TR rows, AGENTS-README-FIRST path, actual screenshot path, wireframe path, and result schema.
- id: TR-AIUNITREPL-009
  text: Screenshot capture must use deterministic terminal size and a seeded fixture workspace.
agentsReadmeFirstPath: AGENTS-README-FIRST.yaml
actualScreenshotPath: docs/screenshots/aiunit-repl/03-strategy-catalog.png
wireframeScreenshotPath: docs/screenshots/aiunit-repl/wireframes/03-strategy-catalog.png
wireframeSvgPath: docs/wireframes/aiunit-repl/03-strategy-catalog.svg
resultSchema: |-
  {
    "$schema": "https://json-schema.org/draft/2020-12/schema",
    "type": "object",
    "additionalProperties": false,
    "required": ["screenId", "summary", "correctElements", "incorrectElements", "colorAccessibilityValidation", "wireframeSuitability"],
    "properties": {
      "screenId": { "type": "string", "minLength": 1 },
      "summary": { "type": "string", "minLength": 1 },
      "correctElements": {
        "type": "array",
        "minItems": 1,
        "items": {
          "type": "object",
          "additionalProperties": false,
          "required": ["element", "requirement", "evidence", "confidence"],
          "properties": {
            "element": { "type": "string", "minLength": 1 },
            "requirement": { "type": "string", "minLength": 1 },
            "evidence": { "type": "string", "minLength": 1 },
            "confidence": { "type": "number", "minimum": 0, "maximum": 1 }
          }
        }
      },
      "incorrectElements": {
        "type": "array",
        "items": {
          "type": "object",
          "additionalProperties": false,
          "required": ["element", "requirement", "expected", "actual", "whyIncorrect", "severity", "confidence"],
          "properties": {
            "element": { "type": "string", "minLength": 1 },
            "requirement": { "type": "string", "minLength": 1 },
            "expected": { "type": "string", "minLength": 1 },
            "actual": { "type": "string", "minLength": 1 },
            "whyIncorrect": { "type": "string", "minLength": 1 },
            "severity": { "type": "string", "enum": ["low", "medium", "high", "critical"] },
            "confidence": { "type": "number", "minimum": 0, "maximum": 1 }
          }
        }
      },
      "colorAccessibilityValidation": {
        "type": "object",
        "additionalProperties": false,
        "required": ["colorsMatchWireframe", "adaCompliant", "deviations", "why"],
        "properties": {
          "colorsMatchWireframe": { "type": "boolean" },
          "adaCompliant": { "type": "boolean" },
          "deviations": {
            "type": "array",
            "items": {
              "type": "object",
              "additionalProperties": false,
              "required": ["element", "expected", "actual", "whyDeviationMatters", "severity", "confidence"],
              "properties": {
                "element": { "type": "string", "minLength": 1 },
                "expected": { "type": "string", "minLength": 1 },
                "actual": { "type": "string", "minLength": 1 },
                "whyDeviationMatters": { "type": "string", "minLength": 1 },
                "severity": { "type": "string", "enum": ["low", "medium", "high", "critical"] },
                "confidence": { "type": "number", "minimum": 0, "maximum": 1 }
              }
            }
          },
          "why": { "type": "string", "minLength": 1 }
        }
      },
      "wireframeSuitability": {
        "type": "object",
        "additionalProperties": false,
        "required": ["rating", "why", "missingRequirements", "recommendedWireframeChanges"],
        "properties": {
          "rating": { "type": "string", "enum": ["suitable", "partially_suitable", "unsuitable"] },
          "why": { "type": "string", "minLength": 1 },
          "missingRequirements": { "type": "array", "items": { "type": "string" } },
          "recommendedWireframeChanges": { "type": "array", "items": { "type": "string" } }
        }
      }
    }
  }
