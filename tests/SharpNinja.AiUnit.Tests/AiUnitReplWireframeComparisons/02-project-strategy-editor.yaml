screenId: project-strategy-editor
wireframeBaselineVersion: svg-1
title: Project strategy editor
prompt: |-
  Compare the finished aiUnit terminal screenshot against the rendered PNG baseline from the canonical SVG wireframe for the Project Strategy Editor screen.
  Validate that the actual screen preserves the required strategy list, active strategy, selected project details, mutation actions, restore affordance, and command/status bar semantics. Treat minor terminal styling differences as acceptable unless they hide or remove a required control, state, or label.
functionalRequirements:
- id: FR-AIUNITREPL-003
  text: Support REPL and one-shot commands for list, show, set-active, add-strategy, edit-strategy, remove-strategy, restore, and validate workflows.
- id: FR-AIUNITREPL-004
  text: Provide a TUI project strategy editor screen.
- id: FR-AIUNITREPL-005
  text: Allow zero or more strategies per project while preserving existing project settings during operations.
- id: FR-AIUNITREPL-007
  text: Preserve restorable snapshots before mutations and allow restoring individual project settings.
technicalRequirements:
- id: TR-AIUNIT-REPL-002
  text: Use structured parsers and serializers for JSON configuration instead of string edits.
- id: TR-AIUNIT-REPL-004
  text: Keep command parsing and TUI operations over a shared application service layer.
- id: TR-AIUNIT-REPL-007
  text: Wireframe comparison scenarios must include prompt, FR/TR rows, AGENTS-README-FIRST path, actual screenshot path, wireframe path, and result schema.
agentsReadmeFirstPath: AGENTS-README-FIRST.yaml
actualScreenshotPath: docs/screenshots/aiunit-repl/02-project-strategy-editor.png
wireframeScreenshotPath: docs/screenshots/aiunit-repl/wireframes/02-project-strategy-editor.png
wireframeSvgPath: docs/wireframes/aiunit-repl/02-project-strategy-editor.svg
